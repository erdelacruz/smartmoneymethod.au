<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TradeASX — Australian Stock Exchange</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  </head>
  <body>
    <!--
      React mounts the entire application inside this single div.
      This is the "root" DOM node — React replaces its content with
      the component tree rendered by App.jsx.
    -->
    <div id="root"></div>

    <!--
      Vite injects the compiled JS bundle here at build time.
      The type="module" attribute tells the browser to treat this as
      an ES Module, enabling modern JavaScript features like import/export.
    -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
