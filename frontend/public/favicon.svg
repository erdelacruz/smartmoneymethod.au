<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40">
  <!-- Dark rounded background -->
  <rect width="40" height="40" rx="10" fill="#1A2838"/>
  <!-- Outer gold circle ring -->
  <circle cx="20" cy="20" r="13" fill="none" stroke="#D4A017" stroke-width="1.5"/>
  <!-- Subtle inner gold fill -->
  <circle cx="20" cy="20" r="9" fill="#D4A017" opacity="0.18"/>
  <!-- Upward arrow stem -->
  <line x1="20" y1="26" x2="20" y2="15" stroke="#D4A017" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Upward arrow head -->
  <path d="M16 19 L20 15 L24 19" fill="none" stroke="#D4A017" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Two horizontal lines below arrow -->
  <line x1="15.5" y1="22" x2="24.5" y2="22" stroke="#D4A017" stroke-width="1.3" stroke-linecap="round" opacity="0.8"/>
  <line x1="15.5" y1="25" x2="24.5" y2="25" stroke="#D4A017" stroke-width="1.3" stroke-linecap="round" opacity="0.8"/>
</svg>
